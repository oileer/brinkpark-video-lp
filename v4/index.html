        @keyframes fadeout-hint { 0%, 60% { opacity: 1; } 100% { opacity: 0; } }

        function montarBarras() {
            var wrap = document.getElementById('storiesBars');
            wrap.innerHTML = '';
            wrap.style.display = 'flex';
            var total = storyState.lista.length + 1; // + slide final
            for (var i = 0; i < total; i++) {
                var bar = document.createElement('div');
                bar.className = 'bar';
                bar.innerHTML = '<span></span>';
                wrap.appendChild(bar);
            }
        }

        function atualizarBarras(idx) {
            var barras = document.querySelectorAll('#storiesBars .bar');
            barras.forEach(function (b, i) {
                b.classList.remove('visto', 'ativa');
                var span = b.querySelector('span');
                span.style.transition = 'none';
                span.style.width = i < idx ? '100%' : '0%';
                if (i === idx) b.classList.add('ativa');
                if (i < idx) b.classList.add('visto');
            });
        }

        function mostrarSlide(idx) {
            storyState.idx = idx;
            atualizarBarras(idx);

            var ultimoSlide = idx === storyState.lista.length;
            var video, dadosModelo;

            if (ultimoSlide) {
                video = FINAL_SLIDE.video;
                dadosModelo = null;
            } else {
                var chave = storyState.lista[idx];
                dadosModelo = MODELOS[chave];
                video = dadosModelo.video;
            }

            var proximo = trocarVideo(video, function () {
                if (ultimoSlide) { mostrarCTAFinal(); return; }
                if (storyState.idx < storyState.lista.length) avancarSlide();
            });

            if (dadosModelo) {
                proximo.ontimeupdate = function () {
                    var bar = document.querySelectorAll('#storiesBars .bar')[idx];
                    if (bar && proximo.duration) {
                        var span = bar.querySelector('span');
                        span.style.transition = 'none';
                        span.style.width = (proximo.currentTime / proximo.duration * 100) + '%';
                    }
                };
                mostrarCardModelo(dadosModelo);
            } else {
                document.getElementById('storyCard').style.display = 'none';
                mostrarCTAFinal(true); // já mostra CTA junto do vídeo final, sem esperar acabar
            }
        }

        function mostrarCardModelo(dadosModelo) {
            var card = document.getElementById('storyCard');
            var preco = PRECOS[dadosModelo.modelo];
            card.style.display = 'block';
            card.innerHTML =
                '<div class="modelo-nome">Cama Elástica ' + dadosModelo.modelo + '</div>' +
                (preco
                    ? '<div class="modelo-preco">' + preco.preco + ' <span style="opacity:.8;font-weight:500">ou ' + preco.parcela + '</span></div>'
                    : '<div class="modelo-preco consultar">Consulte o valor no WhatsApp</div>') +
                '<div class="story-card-btns">' +
                    '<button class="btn-escolha destaque" id="btnEscolherModelo" style="flex:1">Quero este</button>' +
                '</div>';
            document.getElementById('btnEscolherModelo').onclick = function () {
                estado.modelo = dadosModelo.modelo;
                track('funil_escolha', { modelo: dadosModelo.modelo });
                acoes.whatsPedido();
            };
        }

        function avancarSlide() {
            if (storyState.idx < storyState.lista.length) mostrarSlide(storyState.idx + 1);
        }
        function voltarSlide() {
            if (storyState.idx > 0) mostrarSlide(storyState.idx - 1);
        }

        document.getElementById('tapNext').onclick = function () { if (storyState) avancarSlide(); };
        document.getElementById('tapPrev').onclick = function () { if (storyState) voltarSlide(); };

        function mostrarCTAFinal(semEsperar) {
            document.getElementById('storyCard').style.display = 'none';
            document.getElementById('tapPrev').style.display = 'none';
            document.getElementById('tapNext').style.display = 'none';
            choicesEl.innerHTML = '';
            var p = document.createElement('div');
            p.className = 'pergunta';
            p.textContent = 'Falta só um passo';
            choicesEl.appendChild(p);

            var btnPedido = document.createElement('button');
            btnPedido.className = 'btn-escolha whats';
            btnPedido.innerHTML = '<svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M26.179 6.047a13.815 13.815 0 0 0-9.836-4.078C8.678 1.97 2.44 8.207 2.437 15.874c0 2.45.64 4.842 1.857 6.951L2.32 30.031l7.371-1.934a13.893 13.893 0 0 0 6.645 1.692h.006c7.663 0 13.902-6.238 13.905-13.904a13.821 13.821 0 0 0-4.069-9.838zm-9.836 21.394h-.005a11.54 11.54 0 0 1-5.882-1.61l-.422-.251-4.375 1.147 1.168-4.265-.275-.437a11.53 11.53 0 0 1-1.767-6.15C4.788 9.501 9.972 4.317 16.347 4.317a11.479 11.479 0 0 1 8.171 3.39 11.488 11.488 0 0 1 3.382 8.176c-.002 6.372-5.187 11.557-11.557 11.557z" fill="currentColor"></path><path fill-rule="evenodd" clip-rule="evenodd" d="M22.682 18.785c-.347-.174-2.055-1.014-2.374-1.13-.318-.116-.55-.174-.782.174-.231.348-.897 1.13-1.1 1.362-.202.232-.405.261-.752.087-.348-.174-1.467-.54-2.794-1.724-1.033-.922-1.73-2.06-1.933-2.407-.203-.348-.022-.536.152-.71.156-.155.348-.405.521-.608.174-.203.232-.348.348-.58.116-.232.058-.434-.03-.608-.086-.174-.781-1.884-1.07-2.58-.283-.678-.569-.586-.782-.597-.203-.01-.435-.012-.666-.012-.232 0-.608.087-.927.435-.318.348-1.216 1.188-1.216 2.898 0 1.71 1.245 3.363 1.419 3.595.174.232 2.45 3.74 5.935 5.246.83.358 1.476.572 1.98.732.833.264 1.59.227 2.19.137.667-.1 2.055-.84 2.345-1.652.289-.811.289-1.507.202-1.652-.087-.145-.318-.232-.666-.406z" fill="currentColor"></path></svg> Fazer meu pedido no WhatsApp';
            btnPedido.onclick = function () { acoes.whatsPedido(); };
            choicesEl.appendChild(btnPedido);

            var btnModelos = document.createElement('button');
            btnModelos.className = 'btn-escolha';
            btnModelos.textContent = 'Ver todos os modelos e fotos';
            btnModelos.onclick = function () { acoes.verDetalhes(); };
            choicesEl.appendChild(btnModelos);

            document.getElementById('progresso').style.width = '100%';
            choicesEl.classList.add('visivel');
        }

        // ===== AÇÕES =====
        var acoes = {
            whatsPedido: function () {
                track('funil_whatsapp_click', { tipo: 'pedido', modelo: estado.modelo, regiao: estado.regiao, finalidade: estado.finalidade });
                var msg = 'Olá! Quero fazer o pedido da cama elástica' +
                    (estado.modelo ? ' *' + estado.modelo + '*' : '') +
                    (estado.finalidade ? ' para *' + estado.finalidade + '*' : '') +
                    (estado.regiao ? ', região *' + estado.regiao + '*' : '') +
                    '.\n\nMeus dados:\nNome: \nEndereço: \nTelefone: \nTelefone reserva: ';
                window.location.href = 'https://wa.me/' + WHATS_NUMERO + '?text=' + encodeURIComponent(msg);
            },
            whatsDuvida: function () {
                track('funil_whatsapp_click', { tipo: 'duvida' });
                window.location.href = WHATS_URL;
            },
            whatsOutraRegiao: function () {
                track('funil_whatsapp_click', { tipo: 'outra_regiao' });
                var msg = 'Olá! Tenho interesse na cama elástica, mas sou do Norte. Vocês atendem minha cidade?';
                window.location.href = 'https://wa.me/' + WHATS_NUMERO + '?text=' + encodeURIComponent(msg);
            },
            verDetalhes: function () {
                track('funil_ver_detalhes', { modelo: estado.modelo });
                window.location.href = HUB_MODELOS;
            }
        };

        // ===== MUTE =====
        var muteBtn = document.getElementById('muteBtn');
        muteBtn.onclick = function () {
            mutado = !mutado;
            vids.forEach(function (v) { v.muted = mutado; });
            muteBtn.innerHTML = mutado ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="m19.4 8.6-1.4 1.4-2-2-1.4 1.4 2 2-2 2 1.4 1.4 2-2 2 2 1.4-1.4-2-2 2-2z" transform="translate(-1.4 1)"/></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"/></svg>';
        };

        // ===== GATE INICIAL =====
        document.getElementById('playBtn').onclick = function () {
            document.getElementById('gate').style.display = 'none';
            muteBtn.style.display = 'block';
            track('funil_inicio', {});
            irPara('inicio');
        };
    </script>
</body>
