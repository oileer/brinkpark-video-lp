        :root {

            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            padding: 0 16px 24px;
        }

        /* HEADER (igual LP original) */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 60px;
            width: calc(100% + 32px);
            margin: 0 -16px 16px;
            background-color: var(--white);
            border-bottom: 1px solid var(--border-light);
        }

        .header-title img { display: block; height: 34px; width: auto; }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* BANNER PROMOCIONAL (igual LP original) */
        .promo-banner {
            width: 100%;
            background-color: var(--danger-red);
            border-radius: var(--radius-md);
            padding: 18px;
            color: var(--white);
            box-shadow: 0 8px 16px rgba(209, 0, 0, 0.2);
            margin-bottom: 16px;
        }

        .promo-banner-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .promo-banner p {
            font-size: 12px;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.95;
        }

        /* Barra de progresso */
        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, .2);
            z-index: 30;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            width: 0;
            background: var(--primary-green);
            transition: width .5s ease;
        }

        /* Player (card arredondado no padrão da LP) */
        .stage {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            max-height: calc(100dvh - 130px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .stage video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity .25s;
        }

        .stage video.ativo {
            opacity: 1;
        }

        /* Botão mute */
        .mute-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 40;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, .55);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: none;
        }

        /* Tela inicial (gate de autoplay) */
        .start-gate {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: linear-gradient(rgba(0, 0, 0, .45), rgba(0, 0, 0, .75));
            text-align: center;
            padding: 24px;
        }

        .start-gate h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.3;
        }

        .start-gate p {
            color: rgba(255, 255, 255, .85);
            font-size: 15px;
        }

        .play-btn {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: none;
            background: var(--primary-green);
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 0 0 10px rgba(22, 163, 74, .3);
            animation: pulsar 1.6s infinite;
        }

        @keyframes pulsar {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, .45); }
            70% { box-shadow: 0 0 0 18px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        /* Overlay de escolhas */
        .choices {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 40;

            flex-direction: column;
            gap: 10px;
            transform: translateY(105%);
            transition: transform .35s ease;
        }

        .choices.visivel {
            transform: translateY(0);
        }

        .choices .pergunta {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }

        .btn-escolha {
            width: 100%;
            padding: 15px 18px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--white);
            color: var(--text-dark);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .1s;
        }

        .btn-escolha svg { vertical-align: -3px; margin-right: 7px; }

        .btn-escolha:active {
            transform: scale(.97);
        }

        .btn-escolha.destaque {
            background: var(--primary-green);
            color: #fff;
        }

        .btn-escolha.whats {
            background: var(--whatsapp-green);
            color: #fff;
        }

        .btn-escolha small {
            display: block;
            font-weight: 500;
            font-size: 13px;
            opacity: .75;
        }

        .link-fallback {
            text-align: center;
            margin-top: 4px;
        }

        .link-fallback a {
            color: rgba(255, 255, 255, .7);
            font-size: 13px;
            text-decoration: underline;
        }
        /* ===== VERSAO ORIGINAL: imersiva, literal aos audios ===== */
        body { background: #0d0d0d; }
        .app-container { background: #000; padding: 0; box-shadow: none; }
        .app-header, .promo-banner, .progress-bar, .link-fallback { display: none !important; }
        .stage { flex: 1; aspect-ratio: auto; max-height: none; border-radius: 0; box-shadow: none; }

                var msg = 'Olá! Quero fazer o pedido da cama elástica *' + (estado.modelo || '') +
                    '* para *' + (estado.finalidade || '') + '*, região *' + (estado.regiao || '') +
                    '*.\n\nMeus dados:\nNome: \nEndereço: \nTelefone: \nTelefone reserva: ';
                window.location.href = 'https://wa.me/' + WHATS_NUMERO + '?text=' + encodeURIComponent(msg);
            },
            whatsDuvida: function () {
                track('funil_whatsapp_click', { tipo: 'duvida' });
                window.location.href = WHATS_URL;
            },
            whatsOutraRegiao: function () {
                track('funil_whatsapp_click', { tipo: 'outra_regiao' });
                var msg = 'Olá! Tenho interesse na cama elástica, mas sou de outra região. Vocês atendem minha cidade?';
                window.location.href = 'https://wa.me/' + WHATS_NUMERO + '?text=' + encodeURIComponent(msg);
            },
            verDetalhes: function () {
                var no = null;
                // acha a página de detalhes do último modelo visto
                if (estado.modelo && estado.modelo.indexOf('4,27') === 0) no = FUNIL.modelo427;
                else if (estado.modelo && estado.modelo.indexOf('3,05') === 0) no = FUNIL.modelo305;
                else no = FUNIL.modelo244;
                track('funil_ver_detalhes', { modelo: estado.modelo });
                window.location.href = no.urlDetalhes;
            }
        };

        // ===== MUTE =====
        var muteBtn = document.getElementById('muteBtn');
        muteBtn.onclick = function () {
            mutado = !mutado;
            vids.forEach(function (v) { v.muted = mutado; });
            muteBtn.innerHTML = mutado ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="m19.4 8.6-1.4 1.4-2-2-1.4 1.4 2 2-2 2 1.4 1.4 2-2 2 2 1.4-1.4-2-2 2-2z" transform="translate(-1.4 1)"/></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.2v2.1a7 7 0 0 1 0 13.4v2.1a9 9 0 0 0 0-17.6z"/></svg>';
        };

        // ===== GATE INICIAL =====
        document.getElementById('playBtn').onclick = function () {
            document.getElementById('gate').style.display = 'none';
            muteBtn.style.display = 'block';
            track('funil_inicio', {});
            irPara('boasVindas');
        };
    </script>
</body>
